services:
  leetcast:
    build: .
    container_name: leetcast
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
    volumes:
      - ./downloads:/app/downloads
      - ./cache:/app/cache
    command: node dist/cli.js
